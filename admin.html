<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>WashFit - Панель Администратора</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body class="antialiased min-h-screen flex flex-col bg-black text-white relative z-0">
  <div class="absolute inset-0 z-[-1] opacity-20 bg-[url('data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iNDAiIGhlaWdodD0iNDAiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+PGNpcmNsZSBjeD0iMSIgY3k9IjEiIHI9IjEiIGZpbGw9IiNmZjAwMDAiIGZpbGwtb3BhY2l0eT0iMC41Ii8+PC9zdmc+')] pointer-events-none"></div>
  <div class="absolute inset-0 z-[-2] pointer-events-none bg-gradient-to-b from-[#110000] via-[#020202] to-[#020202]"></div>

  <div class="flex-grow max-w-6xl mx-auto w-full p-6 lg:p-10 relative z-10">
    
    <!-- Admin Header -->
    <header class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-10 gap-4 reveal active">
      <div>
        <div class="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-red-900/20 border border-red-500/30 text-red-400 text-xs font-bold uppercase tracking-wider mb-4">
          <span class="w-2 h-2 rounded-full bg-red-500 animate-pulse"></span> Partner Portal
        </div>
        <h1 class="text-3xl md:text-4xl font-black uppercase tracking-tight">WashFit <span class="text-transparent bg-clip-text bg-gradient-to-r from-red-500 to-orange-500 hover:from-orange-500 hover:to-red-500 transition-all duration-500">Admin</span></h1>
      </div>
      
      <a href="index.html" class="glass-panel px-4 py-2.5 rounded-lg text-gray-300 hover:text-white flex items-center gap-2 text-sm font-medium transition-all hover:bg-white/10 ripple-button">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
        Вернуться на сайт
      </a>
    </header>

    <!-- Stats Cards -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
      <div class="glass-panel tilt-card p-6 rounded-2xl border-t border-t-white/10 relative overflow-hidden reveal active delay-100 hover:scale-105 transition-transform cursor-pointer">
        <div class="absolute top-0 right-0 -m-10 w-24 h-24 bg-blue-600 rounded-full blur-2xl opacity-30 transition-all hover:scale-150"></div>
        <div class="tilt-content">
          <h3 class="text-gray-400 font-medium text-sm mb-1 uppercase tracking-wider">Всего за сегодня</h3>
          <p id="stat-total" class="text-4xl font-black text-white drop-shadow-md">0</p>
        </div>
      </div>
      <div class="glass-panel tilt-card p-6 rounded-2xl border-t border-t-white/10 relative overflow-hidden reveal active delay-200 hover:scale-105 transition-transform cursor-pointer">
        <div class="absolute top-0 right-0 -m-10 w-24 h-24 bg-green-600 rounded-full blur-2xl opacity-30 transition-all hover:scale-150"></div>
        <div class="tilt-content">
          <h3 class="text-gray-400 font-medium text-sm mb-1 uppercase tracking-wider">Завершено</h3>
          <p id="stat-done" class="text-4xl font-black text-green-400 drop-shadow-md">0</p>
        </div>
      </div>
      <div class="glass-panel tilt-card p-6 rounded-2xl border-t border-t-white/10 relative overflow-hidden reveal active delay-300 hover:scale-105 transition-transform cursor-pointer">
        <div class="absolute top-0 right-0 -m-10 w-24 h-24 bg-yellow-600 rounded-full blur-2xl opacity-30 transition-all hover:scale-150 animate-pulse"></div>
        <div class="tilt-content">
          <h3 class="text-gray-400 font-medium text-sm mb-1 uppercase tracking-wider">В ожидании/Процессе</h3>
          <p id="stat-active" class="text-4xl font-black text-yellow-400 drop-shadow-md">0</p>
        </div>
      </div>
    </div>

    <!-- Bookings Table -->
    <div class="glass-panel rounded-2xl border border-gray-800 shadow-2xl overflow-hidden reveal active delay-400 hover:border-gray-700 transition-colors">
      <div class="p-6 border-b border-gray-800 bg-black/40 flex justify-between items-center group">
        <h2 class="text-lg font-bold uppercase tracking-wider text-white flex items-center gap-3">
          <svg class="w-5 h-5 text-red-500 group-hover:rotate-12 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"></path></svg>
          Текущие бронирования
        </h2>
        <div class="flex items-center gap-3">
          <div class="w-2 h-2 rounded-full bg-green-500 animate-ping"></div>
          <span class="text-xs font-bold text-gray-400 uppercase tracking-widest">LIVE SYNC</span>
        </div>
      </div>
      
      <div class="overflow-x-auto">
        <table class="w-full text-left border-collapse whitespace-nowrap">
          <thead>
            <tr class="bg-gray-900/30 text-gray-400 border-b border-gray-800 text-xs font-bold uppercase tracking-wider">
              <th class="p-4 rounded-tl-lg">Клиент (Email)</th>
              <th class="p-4">Детали (Локация & Фишки)</th>
              <th class="p-4">Время заявки</th>
              <th class="p-4">Текущий Статус</th>
              <th class="p-4 text-right">Действия</th>
            </tr>
          </thead>
          <tbody id="bookings-table" class="divide-y divide-gray-800/50">
            <!-- Data injected by JS -->
            <tr>
              <td colspan="5" class="p-12 text-center">
                <div class="inline-flex flex-col items-center gap-4">
                  <div class="w-8 h-8 border-4 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
                  <span class="text-sm text-gray-400 font-medium tracking-widest uppercase animate-pulse">Загрузка данных...</span>
                </div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    // Ripple Effect Logic
    function createRipple(event) {
      const button = event.currentTarget;
      const ripple = document.createElement('span');
      const rect = button.getBoundingClientRect();
      const size = Math.max(rect.width, rect.height);
      const x = event.clientX - rect.left - size / 2;
      const y = event.clientY - rect.top - size / 2;
      ripple.style.width = ripple.style.height = `${size}px`;
      ripple.style.left = `${x}px`;
      ripple.style.top = `${y}px`;
      ripple.classList.add('ripple');
      button.appendChild(ripple);
      setTimeout(() => ripple.remove(), 600);
    }
    
    document.querySelectorAll('.ripple-button').forEach(btn => {
      btn.addEventListener('click', createRipple);
    });
  </script>
  <script type="module" src="js/admin.js"></script>
</body>
</html>
